<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DPF — System Map</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; }
  header.top {
    padding: var(--s-4) var(--s-6); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between; gap: var(--s-5);
    background: var(--bg-elev); position: sticky; top: 0; z-index: 10;
  }
  header.top h1 { font-size: 14px; margin: 0; font-weight: 600; letter-spacing: .02em; }
  header.top .crumbs { color: var(--ink-faint); font-size: 12px; font-family: var(--font-mono); }
  .modes { display: flex; gap: 2px; background: var(--bg-elev-2); border-radius: var(--r-md); padding: 3px; }
  .modes button {
    border: 0; background: transparent; color: var(--ink-dim); padding: 6px 12px;
    border-radius: var(--r-sm); font-size: 12px; cursor: pointer; letter-spacing: .02em;
  }
  .modes button.active { background: var(--bg-card); color: var(--ink); box-shadow: var(--shadow-1); }

  main { flex: 1; display: grid; grid-template-columns: 1fr 420px; min-height: 0; }
  .canvas { overflow: auto; padding: var(--s-6) var(--s-7); background:
    radial-gradient(circle at 20% 10%, #15191f 0%, var(--bg) 60%); }
  aside.detail {
    border-left: 1px solid var(--line); background: var(--bg-elev);
    overflow-y: auto; padding: var(--s-5) var(--s-5);
  }

  /* Lane layout */
  .lane { margin-bottom: var(--s-7); }
  .lane-head {
    display: flex; align-items: baseline; gap: var(--s-3);
    margin-bottom: var(--s-3); padding-bottom: var(--s-2);
    border-bottom: 1px dashed var(--line);
  }
  .lane-head .id {
    font-family: var(--font-mono); font-size: 11px; color: var(--accent);
    background: var(--accent-soft); padding: 2px 8px; border-radius: var(--r-sm);
    letter-spacing: .08em;
  }
  .lane-head .title { font-size: 18px; font-weight: 600; letter-spacing: -.01em; }
  .lane-head .trigger { color: var(--ink-faint); font-size: 12px; font-family: var(--font-mono); margin-left: auto; }
  .lane-blurb { color: var(--ink-dim); font-size: 13px; margin-bottom: var(--s-4); max-width: 80ch; line-height: 1.5; }

  .nodes { display: flex; flex-wrap: wrap; gap: var(--s-2); }
  .node {
    cursor: pointer; user-select: none;
    background: var(--bg-card); border: 1px solid var(--line);
    border-radius: var(--r-md); padding: 8px 10px;
    display: flex; flex-direction: column; gap: 3px;
    min-width: 140px; max-width: 200px;
    transition: border-color .12s, transform .12s;
  }
  .node:hover { border-color: var(--line-strong); transform: translateY(-1px); }
  .node.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .node .nid { font-family: var(--font-mono); font-size: 10px; color: var(--ink-faint); letter-spacing: .06em; }
  .node .nt { font-size: 12px; color: var(--ink); line-height: 1.3; }
  .node.has-controls { border-left: 2px solid var(--accent); }
  .node .ctrl-pips { display: flex; gap: 2px; margin-top: 2px; }
  .node .ctrl-pips span {
    width: 6px; height: 6px; border-radius: 50%;
    background: color-mix(in srgb, var(--accent) 80%, transparent);
  }

  /* Tables grid (data view) */
  .tables { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: var(--s-4); }
  .table-card {
    background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--r-md);
    padding: var(--s-4); cursor: pointer;
  }
  .table-card:hover { border-color: var(--line-strong); }
  .table-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .table-card .tt { font-size: 14px; font-weight: 600; margin-bottom: 2px; display: flex; justify-content: space-between; }
  .table-card .tt .role { font-size: 10px; padding: 2px 6px; border-radius: var(--r-sm); background: var(--bg-elev-2); color: var(--ink-faint); font-weight: 400; letter-spacing: .04em; }
  .table-card .td { font-size: 12px; color: var(--ink-dim); line-height: 1.45; }
  .role-input  { color: var(--info) !important; }
  .role-control{ color: var(--accent) !important; }
  .role-core   { color: var(--ok) !important; }
  .role-feedback { color: var(--warn) !important; }
  .role-ops    { color: var(--ink-dim) !important; }

  /* Controls grid */
  .ctrls { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--s-4); }
  .ctrl-card {
    background: linear-gradient(180deg, var(--bg-card), var(--bg-elev));
    border: 1px solid var(--line); border-left: 3px solid var(--accent);
    border-radius: var(--r-md); padding: var(--s-4);
  }
  .ctrl-card h3 { margin: 0 0 4px; font-size: 13px; }
  .ctrl-card .blurb { font-size: 12px; color: var(--ink-dim); line-height: 1.5; margin-bottom: var(--s-3); }
  .ctrl-card .where { font-family: var(--font-mono); font-size: 10px; color: var(--ink-faint); }

  /* Detail pane */
  .empty { padding: 80px 20px; text-align: center; color: var(--ink-faint); font-size: 13px; }
  .detail h2 { margin: 0 0 4px; font-size: 16px; font-weight: 600; }
  .detail .sub { color: var(--ink-faint); font-family: var(--font-mono); font-size: 11px; margin-bottom: var(--s-4); }
  .detail .desc { font-size: 13px; line-height: 1.6; color: var(--ink); margin-bottom: var(--s-5); }
  .detail section { margin-bottom: var(--s-5); }
  .detail section h4 { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-faint); margin: 0 0 var(--s-2); font-weight: 600; }
  .detail .api { background: var(--bg); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 8px 10px; font-family: var(--font-mono); font-size: 11px; color: var(--accent); word-break: break-all; }
  .detail .field-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .detail .field-list .tag { font-family: var(--font-mono); font-size: 10px; }
  .detail .ctrl-tags { display: flex; flex-wrap: wrap; gap: 4px; }

  .legend { padding: var(--s-3) var(--s-6); border-top: 1px solid var(--line); background: var(--bg-elev); display: flex; gap: var(--s-5); font-size: 11px; color: var(--ink-faint); flex-wrap: wrap; }
  .legend .item { display: inline-flex; align-items: center; gap: 6px; }
  .legend .swatch { width: 10px; height: 10px; border-radius: 3px; background: var(--accent); }
  .legend .swatch.ctrl { border-left: 3px solid var(--accent); background: var(--bg-card); }
</style>
</head>
<body>
<header class="top">
  <div>
    <h1>DPF System Map</h1>
    <div class="crumbs">v1.3.0 · 12 tables · 6 scenarios · 7 controls</div>
  </div>
  <div class="modes">
    <button data-mode="scenarios" class="active">Scenarios</button>
    <button data-mode="tables">Tables</button>
    <button data-mode="controls">Controls</button>
  </div>
</header>
<main>
  <div class="canvas" id="canvas"></div>
  <aside class="detail" id="detail">
    <div class="empty">Click any node, table, or control<br>for full specification.</div>
  </aside>
</main>
<div class="legend">
  <span class="item"><span class="swatch ctrl"></span> Compliance-control node</span>
  <span class="item"><span class="swatch" style="background: var(--info)"></span> Input table</span>
  <span class="item"><span class="swatch" style="background: var(--accent)"></span> Control table</span>
  <span class="item"><span class="swatch" style="background: var(--ok)"></span> Core lifecycle</span>
  <span class="item"><span class="swatch" style="background: var(--warn)"></span> Feedback loop</span>
  <span class="item"><span class="swatch" style="background: var(--ink-dim)"></span> Operations</span>
</div>

<script src="data.js"></script>
<script>
const $ = s => document.querySelector(s);
const canvas = $('#canvas');
const detail = $('#detail');
let mode = 'scenarios';
let selected = null;

function render() {
  canvas.innerHTML = '';
  if (mode === 'scenarios') renderScenarios();
  else if (mode === 'tables') renderTables();
  else renderControls();
}

function renderScenarios() {
  for (const s of DPF_MAP.scenarios) {
    const lane = document.createElement('div');
    lane.className = 'lane';
    lane.innerHTML = `
      <div class="lane-head">
        <span class="id">${s.id}</span>
        <span class="title">${s.title}</span>
        <span class="dim mono" style="font-size:11px">${s.code}</span>
        <span class="trigger">${s.trigger}</span>
      </div>
      <div class="lane-blurb">${s.blurb}</div>
      <div class="nodes" data-scenario="${s.id}"></div>
    `;
    canvas.appendChild(lane);
    const nodesEl = lane.querySelector('.nodes');
    for (const m of s.modules) {
      const node = document.createElement('div');
      node.className = 'node' + (m.controls ? ' has-controls' : '');
      node.dataset.kind = 'module';
      node.dataset.scenarioId = s.id;
      node.dataset.moduleId = m.id;
      node.innerHTML = `
        <span class="nid">${m.id}</span>
        <span class="nt">${m.title}</span>
        ${m.controls ? `<div class="ctrl-pips">${m.controls.map(()=>`<span></span>`).join('')}</div>`:''}
      `;
      node.addEventListener('click', () => selectModule(s.id, m.id, node));
      nodesEl.appendChild(node);
    }
  }
}

function renderTables() {
  const grid = document.createElement('div');
  grid.className = 'tables';
  for (const t of DPF_MAP.tables) {
    const card = document.createElement('div');
    card.className = 'table-card';
    card.dataset.tableId = t.id;
    card.innerHTML = `
      <div class="tt">${t.title}<span class="role role-${t.role}">${t.role}</span></div>
      <div class="td">${t.desc}</div>
      <div class="dim mono" style="margin-top:8px;font-size:10px">${t.count} fields</div>
    `;
    card.addEventListener('click', () => selectTable(t.id, card));
    grid.appendChild(card);
  }
  canvas.appendChild(grid);
}

function renderControls() {
  const grid = document.createElement('div');
  grid.className = 'ctrls';
  for (const c of DPF_MAP.controls) {
    const card = document.createElement('div');
    card.className = 'ctrl-card';
    card.innerHTML = `
      <h3>${c.name}</h3>
      <div class="blurb">${c.blurb}</div>
      <div class="where">Mitigates: ${c.risks.join(', ')}<br>Where: ${c.where.join(' · ')}</div>
    `;
    grid.appendChild(card);
  }
  canvas.appendChild(grid);
}

function clearSelected() {
  document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
}

function selectModule(scenarioId, moduleId, el) {
  clearSelected(); el.classList.add('selected');
  const s = DPF_MAP.scenarios.find(x => x.id === scenarioId);
  const m = s.modules.find(x => x.id === moduleId);
  detail.innerHTML = `
    <h2>${m.title}</h2>
    <div class="sub">Scenario ${s.id} · ${s.code} · Module ${m.id}</div>
    <div class="desc">${m.desc}</div>
    <section><h4>API / Mechanism</h4><div class="api">${m.api || '—'}</div></section>
    ${m.controls ? `<section><h4>Compliance Controls</h4><div class="ctrl-tags">${m.controls.map(c=>`<span class="tag accent">${c}</span>`).join('')}</div></section>`:''}
    ${m.branches ? `<section><h4>Branches</h4><div class="ctrl-tags">${m.branches.map(b=>`<span class="tag">${b}</span>`).join('')}</div></section>`:''}
  `;
}

function selectTable(tableId, el) {
  clearSelected(); el.classList.add('selected');
  const t = DPF_MAP.tables.find(x => x.id === tableId);
  detail.innerHTML = `
    <h2>${t.title}</h2>
    <div class="sub">Airtable · role: ${t.role} · ${t.count} fields</div>
    <div class="desc">${t.desc}</div>
    <section><h4>Fields</h4><div class="field-list">${t.fields.map(f=>`<span class="tag">${f}</span>`).join('')}</div></section>
  `;
}

document.querySelectorAll('.modes button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.modes button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    mode = b.dataset.mode;
    detail.innerHTML = '<div class="empty">Click any node, table, or control<br>for full specification.</div>';
    render();
  });
});

render();
</script>
</body>
</html>
