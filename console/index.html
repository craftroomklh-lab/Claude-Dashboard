<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DPF — Operator Console</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
  header.top {
    padding: var(--s-3) var(--s-5); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: var(--s-5);
    background: var(--bg-elev); position: sticky; top: 0; z-index: 10;
  }
  header.top h1 { font-size: 14px; margin: 0; font-weight: 600; }
  .tabs { display: flex; gap: 2px; margin-left: var(--s-5); }
  .tabs button { border: 0; background: transparent; color: var(--ink-dim); padding: 6px 12px; border-radius: var(--r-sm); font-size: 12px; cursor: pointer; }
  .tabs button.active { background: var(--bg-card); color: var(--ink); }
  .gates { margin-left: auto; display: flex; gap: 6px; font-size: 11px; }
  .gate { display: flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: var(--r-sm); background: var(--bg-card); border: 1px solid var(--line); }
  .gate .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); }
  .gate.warn .dot { background: var(--warn); }
  .gate.err .dot { background: var(--err); }

  main { padding: var(--s-5) var(--s-6); overflow-y: auto; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* KPI strip */
  .kpis { display: grid; grid-template-columns: repeat(6, 1fr); gap: var(--s-3); margin-bottom: var(--s-5); }
  .kpi { background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--r-md); padding: var(--s-3) var(--s-4); }
  .kpi .lbl { font-size: 10px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .08em; }
  .kpi .val { font-size: 24px; font-weight: 600; margin-top: 4px; letter-spacing: -.01em; }
  .kpi .sub { font-size: 11px; color: var(--ink-dim); margin-top: 2px; }
  .kpi.ok .val { color: var(--ok); }
  .kpi.warn .val { color: var(--warn); }

  /* Review queue */
  .queue { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: var(--s-4); }
  .product-card {
    background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden;
    display: flex; flex-direction: column;
  }
  .product-card .hero { aspect-ratio: 1; background: var(--bg-elev-2) center/cover no-repeat; }
  .product-card .body { padding: var(--s-3) var(--s-4); flex: 1; display: flex; flex-direction: column; gap: var(--s-2); }
  .product-card .ttl { font-size: 13px; line-height: 1.4; font-weight: 500; }
  .product-card .meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .product-card .scores { display: flex; gap: var(--s-3); padding: var(--s-2) 0; border-top: 1px dashed var(--line); border-bottom: 1px dashed var(--line); }
  .product-card .score { flex: 1; }
  .product-card .score .lbl { font-size: 10px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .06em; }
  .product-card .score .v { font-size: 16px; font-weight: 600; }
  .product-card .score .v.good { color: var(--ok); }
  .product-card .score .v.ok { color: var(--info); }
  .product-card .score .v.weak { color: var(--warn); }
  .product-card .price { display: flex; gap: 4px; align-items: baseline; }
  .product-card .price .now { font-size: 18px; font-weight: 600; }
  .product-card .price .was { font-size: 11px; color: var(--ink-faint); text-decoration: line-through; }
  .product-card .price .save { font-size: 10px; color: var(--ok); }
  .product-card .actions { display: flex; gap: 6px; margin-top: auto; padding-top: var(--s-2); }
  .btn {
    flex: 1; border: 1px solid var(--line); background: var(--bg-elev-2); color: var(--ink);
    padding: 8px 12px; border-radius: var(--r-sm); font-size: 12px; cursor: pointer; font-weight: 500;
  }
  .btn:hover { border-color: var(--line-strong); }
  .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn.primary:hover { filter: brightness(1.05); }
  .btn.ghost { background: transparent; }

  .product-card .flags { font-size: 11px; color: var(--warn); }

  /* Niche strategy */
  .niche-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--line); }
  .niche-table th, .niche-table td { padding: 10px 14px; text-align: left; font-size: 13px; border-bottom: 1px solid var(--line); }
  .niche-table th { background: var(--bg-elev); color: var(--ink-faint); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; }
  .niche-table tr:last-child td { border-bottom: 0; }
  .niche-table .bar { height: 6px; background: var(--bg-elev-2); border-radius: 3px; overflow: hidden; min-width: 80px; }
  .niche-table .bar i { display: block; height: 100%; background: var(--accent); }
  .niche-table .delta.up { color: var(--ok); }
  .niche-table .delta.down { color: var(--err); }
  .spark { display: flex; align-items: end; gap: 2px; height: 24px; }
  .spark i { width: 6px; background: var(--info); border-radius: 1px; }

  /* System health */
  .health { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-4); }
  .panel-card { background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--r-md); padding: var(--s-4); }
  .panel-card h3 { margin: 0 0 var(--s-3); font-size: 13px; font-weight: 600; }
  .log-row { display: grid; grid-template-columns: 80px 70px 100px 1fr; gap: var(--s-3); padding: 6px 0; font-size: 12px; border-bottom: 1px solid var(--line); align-items: baseline; }
  .log-row:last-child { border-bottom: 0; }
  .log-row .ts, .log-row .stage { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); }
  .log-row .msg { color: var(--ink); }
  .gate-list { display: grid; gap: 8px; }
  .gate-list .row { display: grid; grid-template-columns: 1fr auto; padding: 8px 12px; background: var(--bg-elev); border-radius: var(--r-sm); font-size: 12px; }
  .gate-list .row .v { font-family: var(--font-mono); color: var(--ink-dim); }

  /* Detail modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(15,17,21,.55); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; padding: var(--s-5); }
  .modal-bg.open { display: flex; }
  .modal { background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--r-lg); width: 100%; max-width: 1080px; max-height: 92vh; overflow: hidden; display: grid; grid-template-rows: auto 1fr auto; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
  .modal header { padding: var(--s-3) var(--s-5); border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: var(--s-3); }
  .modal header .ttl { font-size: 14px; font-weight: 600; flex: 1; }
  .modal header .x { background: transparent; border: 0; color: var(--ink-dim); font-size: 22px; cursor: pointer; padding: 0 8px; }
  .modal .body { overflow-y: auto; padding: var(--s-5); display: grid; grid-template-columns: 1.1fr 1fr; gap: var(--s-5); }
  .modal footer { padding: var(--s-3) var(--s-5); border-top: 1px solid var(--line); display: flex; gap: var(--s-2); justify-content: flex-end; background: var(--bg-elev); }
  .modal .gallery .main { aspect-ratio: 1; background: var(--bg-elev-2) center/cover no-repeat; border-radius: var(--r-md); }
  .modal .gallery .thumbs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
  .modal .gallery .thumbs div { aspect-ratio: 1; background: var(--bg-elev-2) center/cover no-repeat; border-radius: var(--r-sm); cursor: pointer; border: 2px solid transparent; }
  .modal .gallery .thumbs div.active { border-color: var(--accent); }
  .modal h4 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-faint); margin: 0 0 6px; }
  .modal section { margin-bottom: var(--s-4); }
  .modal .seo-title { font-size: 14px; line-height: 1.45; font-weight: 500; padding: 10px 12px; background: var(--bg-elev); border-radius: var(--r-sm); }
  .modal .seo-desc { font-size: 12px; line-height: 1.55; color: var(--ink-dim); padding: 10px 12px; background: var(--bg-elev); border-radius: var(--r-sm); white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
  .modal .tag-cloud { display: flex; flex-wrap: wrap; gap: 4px; }
  .modal .tag-cloud span { font-size: 11px; padding: 3px 8px; background: var(--bg-elev-2); border-radius: var(--r-sm); font-family: var(--font-mono); }
  .modal .qa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .modal .qa-grid .row { display: flex; justify-content: space-between; padding: 6px 10px; background: var(--bg-elev); border-radius: var(--r-sm); font-size: 12px; }
  .modal .qa-grid .row .v { font-family: var(--font-mono); font-weight: 600; }
  .modal .deliv { padding: 10px 12px; background: var(--bg-elev); border-radius: var(--r-sm); font-size: 12px; }
  .modal .deliv .file { display: flex; justify-content: space-between; padding: 4px 0; font-family: var(--font-mono); }
  .modal .deliv .file .open { color: var(--accent); cursor: pointer; }

  /* Card states */
  .product-card.approved { opacity: .55; }
  .product-card.approved .actions { display: none; }
  .product-card.rejected { opacity: .35; }
  .product-card.rejected .actions { display: none; }
  .state-banner { padding: 6px 12px; font-size: 11px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .08em; }
  .state-banner.approved { background: var(--ok); color: white; }
  .state-banner.rejected { background: var(--err); color: white; }

  /* File preview sub-modal */
  .file-preview-bg { position: fixed; inset: 0; background: rgba(8,9,12,.75); display: none; align-items: center; justify-content: center; z-index: 200; padding: var(--s-5); }
  .file-preview-bg.open { display: flex; }
  .file-preview { background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--r-lg); width: 100%; max-width: 920px; max-height: 90vh; overflow: hidden; display: grid; grid-template-rows: auto 1fr auto; }
  .file-preview header { padding: var(--s-3) var(--s-4); border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: var(--s-3); }
  .file-preview header .name { font-family: var(--font-mono); font-size: 13px; flex: 1; }
  .file-preview header .x { background: transparent; border: 0; color: var(--ink-dim); font-size: 22px; cursor: pointer; }
  .file-preview .body { overflow-y: auto; padding: var(--s-5); background: #2a2d33; }
  .file-preview footer { padding: var(--s-2) var(--s-4); border-top: 1px solid var(--line); font-size: 11px; color: var(--ink-faint); display: flex; gap: var(--s-3); }

  /* Faux PDF page */
  .pdf-page { background: #fefdf9; color: #1a1a1a; width: 100%; max-width: 612px; aspect-ratio: 8.5/11; margin: 0 auto var(--s-3); padding: 48px 56px; box-shadow: 0 4px 24px rgba(0,0,0,.4); border-radius: 4px; font-family: Georgia, serif; font-size: 11px; line-height: 1.5; }
  .pdf-page h1 { font-size: 22px; margin: 0 0 8px; letter-spacing: -.01em; color: #2c2a26; }
  .pdf-page .sub { color: #6b6760; font-size: 11px; margin-bottom: 24px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
  .pdf-page h2 { font-size: 13px; margin: 18px 0 8px; color: #b94e2a; text-transform: uppercase; letter-spacing: .08em; }
  .pdf-page .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dotted #ccc; }
  .pdf-page .field { display: inline-block; border-bottom: 1px solid #999; min-width: 160px; padding: 2px 4px; background: #fff8e8; }

  /* Faux Sheets */
  .sheet { background: white; color: #202124; font-family: 'Roboto', sans-serif; font-size: 11px; border: 1px solid #c9c9c9; max-width: 760px; margin: 0 auto; }
  .sheet .toolbar { background: #f1f3f4; padding: 6px 12px; border-bottom: 1px solid #c9c9c9; font-size: 11px; color: #5f6368; display: flex; gap: 8px; }
  .sheet table { width: 100%; border-collapse: collapse; }
  .sheet th, .sheet td { border: 1px solid #e0e0e0; padding: 6px 8px; text-align: left; }
  .sheet th { background: #f8f9fa; color: #5f6368; font-weight: 500; font-size: 10px; text-align: center; width: 14%; }
  .sheet th.col-a { width: 32%; }
  .sheet td.formula { background: #e8f0fe; color: #1967d2; font-family: 'Roboto Mono', monospace; font-size: 10px; }
  .sheet td.input { background: #fff; }
  .sheet td.total { background: #fef7e0; font-weight: 600; }

  /* Faux Notion */
  .notion { background: white; color: #37352f; font-family: -apple-system, 'Segoe UI', sans-serif; max-width: 760px; margin: 0 auto; padding: 32px 48px; border-radius: 4px; }
  .notion h1 { font-size: 32px; font-weight: 700; margin: 0 0 4px; }
  .notion .icon { font-size: 36px; margin-bottom: 8px; }
  .notion .breadcrumb { color: #9b9a97; font-size: 12px; margin-bottom: 16px; }
  .notion .db { border: 1px solid #ebebea; border-radius: 4px; margin: 16px 0; }
  .notion .db-head { padding: 10px 14px; border-bottom: 1px solid #ebebea; font-weight: 600; font-size: 13px; display: flex; gap: 8px; align-items: center; }
  .notion .db-tabs { display: flex; gap: 2px; padding: 0 8px; border-bottom: 1px solid #ebebea; font-size: 12px; }
  .notion .db-tab { padding: 6px 10px; color: #787774; cursor: pointer; }
  .notion .db-tab.active { color: #37352f; border-bottom: 2px solid #37352f; }
  .notion .db-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; padding: 8px 14px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
  .notion .db-row.head { font-size: 11px; color: #787774; text-transform: uppercase; letter-spacing: .04em; }
  .notion .pill { padding: 2px 8px; border-radius: 3px; font-size: 11px; display: inline-block; }
  .notion .pill.green { background: #dbeddb; color: #4d6e4d; }
  .notion .pill.yellow { background: #fdecc8; color: #876c33; }
  .notion .pill.blue { background: #d3e5ef; color: #426480; }
  .notion .callout { background: #f7f6f3; border-radius: 4px; padding: 12px 14px; margin: 12px 0; font-size: 13px; display: flex; gap: 10px; }
</style>
</head>
<body>
<header class="top">
  <h1>DPF Operator Console</h1>
  <div class="tabs">
    <button data-tab="review" class="active">Review Queue</button>
    <button data-tab="niches">Niches</button>
    <button data-tab="health">System Health</button>
  </div>
  <div class="gates" id="gates"></div>
</header>
<main>
  <section class="panel active" id="panel-review">
    <div class="kpis" id="kpis"></div>
    <div class="queue" id="queue"></div>
  </section>
  <section class="panel" id="panel-niches">
    <table class="niche-table" id="niche-table"></table>
  </section>
  <section class="panel" id="panel-health">
    <div class="health">
      <div class="panel-card">
        <h3>System Config (Go-Live Gates)</h3>
        <div class="gate-list" id="config-gates"></div>
      </div>
      <div class="panel-card">
        <h3>SLO Snapshot (7d)</h3>
        <div class="gate-list">
          <div class="row"><span>Production success rate</span><span class="v">96.4%</span></div>
          <div class="row"><span>Webhook publish success</span><span class="v">98.9%</span></div>
          <div class="row"><span>Sales pull freshness</span><span class="v">3h 12m</span></div>
          <div class="row"><span>QA pass rate</span><span class="v">71% (in band)</span></div>
          <div class="row"><span>Operator approve latency p50</span><span class="v">9h 24m</span></div>
        </div>
      </div>
      <div class="panel-card" style="grid-column: 1 / -1;">
        <h3>Recent RunLog (24h)</h3>
        <div id="logs"></div>
      </div>
    </div>
  </section>
</main>
<div class="modal-bg" id="modal-bg"></div>
<div class="file-preview-bg" id="file-preview-bg"></div>
<script src="data.js"></script>
<script>
const $ = s => document.querySelector(s);
const D = window.DPF_DATA;

function renderGates() {
  const c = D.systemConfig;
  const gates = [
    { lbl: "LLC", ok: c.LegalEntityConfirmed },
    { lbl: "Insurance", ok: new Date(c.InsuranceBoundUntil) > new Date() },
    { lbl: "Etsy biz", ok: c.EtsyShopOwnerType === "business" },
    { lbl: "Disclosure", ok: !!c.DisclosureApprovedAt },
    { lbl: "Master ON", ok: c.MasterEnabled }
  ];
  $('#gates').innerHTML = gates.map(g => `<span class="gate ${g.ok?'':'err'}"><span class="dot"></span>${g.lbl}</span>`).join('');
}

function renderKPIs() {
  const k = D.kpis;
  const items = [
    { lbl: "Ready for Review", val: k.readyForReview, cls: k.readyForReview >= 5 ? "ok" : "warn" },
    { lbl: "Approved Today", val: `${k.approvedToday} / ${D.systemConfig.DailyApprovalsCap}`, sub: "daily cap" },
    { lbl: "Avg QA Score", val: k.avgQAToday.toFixed(2), cls: "ok" },
    { lbl: "Approval Rate 7d", val: `${(k.approvalRate7d*100).toFixed(0)}%` },
    { lbl: "QA Pass Rate 7d", val: `${(k.qaPassRate7d*100).toFixed(0)}%`, sub: "60-85% band" },
    { lbl: "Stuck Generating", val: k.stuckGenerating, cls: k.stuckGenerating === 0 ? "ok" : "warn" }
  ];
  $('#kpis').innerHTML = items.map(i => `
    <div class="kpi ${i.cls||''}">
      <div class="lbl">${i.lbl}</div>
      <div class="val">${i.val}</div>
      ${i.sub?`<div class="sub">${i.sub}</div>`:''}
    </div>`).join('');
}

function renderQueue() {
  const fmt = n => `$${n.toFixed(2)}`;
  const scoreCls = v => v >= 0.90 ? 'good' : v >= 0.82 ? 'ok' : 'weak';
  $('#queue').innerHTML = D.reviewQueue.map(p => `
    <div class="product-card" data-id="${p.id}">
      <div class="hero" style="background-image:url(${p.hero})"></div>
      <div class="body">
        <div class="meta">
          <span class="tag">${p.niche}</span>
          <span class="tag accent">${p.format}</span>
          ${p.interactive?`<span class="tag info">⚡ Interactive</span>`:''}
        </div>
        <div class="ttl">${p.title}</div>
        <div class="scores">
          <div class="score"><div class="lbl">QA</div><div class="v ${scoreCls(p.qa)}">${p.qa.toFixed(2)}</div></div>
          <div class="score"><div class="lbl">Design</div><div class="v ${scoreCls(p.design)}">${p.design.toFixed(2)}</div></div>
          <div class="score"><div class="lbl">Tags / Disc.</div><div class="v ${p.tagCount===13&&p.hasDisclosure?'good':'weak'}">${p.tagCount} ✓</div></div>
        </div>
        <div class="price">
          <span class="now">${fmt(p.price)}</span>
          <span class="was">${fmt(p.marketAvg)}</span>
          <span class="save">−${Math.round((1-p.price/p.marketAvg)*100)}% vs market</span>
        </div>
        ${p.flags.length?`<div class="flags">⚠ ${p.flags.join(' · ')}</div>`:''}
        <div class="actions">
          <button class="btn ghost" data-act="view" data-id="${p.id}">View</button>
          <button class="btn" data-act="reject" data-id="${p.id}">Reject</button>
          <button class="btn primary" data-act="approve" data-id="${p.id}">Approve</button>
        </div>
      </div>
    </div>`).join('');
}

function renderNiches() {
  const maxScore = Math.max(...D.niches.map(n => n.score));
  const maxRev = Math.max(...D.niches.flatMap(n => n.weeklyRev));
  const rows = D.niches.map(n => {
    const delta = n.score - n.prevScore;
    const dCls = delta > 0.02 ? 'up' : delta < -0.02 ? 'down' : '';
    const dArrow = delta > 0.02 ? '▲' : delta < -0.02 ? '▼' : '–';
    const spark = n.weeklyRev.map(v => `<i style="height:${(v/maxRev)*100}%"></i>`).join('');
    return `<tr>
      <td><strong>${n.name}</strong> ${n.pinned?'<span class="tag accent">pinned</span>':''}</td>
      <td><span class="tag ${n.status==='Active'?'ok':n.status==='Paused'?'warn':''}">${n.status}</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="bar" style="flex:1"><i style="width:${(n.score/maxScore)*100}%"></i></div>
          <span class="mono" style="font-size:12px">${n.score.toFixed(2)}</span>
        </div>
      </td>
      <td class="delta ${dCls}">${dArrow} ${(delta>=0?'+':'')}${delta.toFixed(2)}</td>
      <td><div class="spark">${spark}</div></td>
      <td class="dim">${n.products}</td>
    </tr>`;
  }).join('');
  $('#niche-table').innerHTML = `
    <thead><tr>
      <th>Niche</th><th>Status</th><th>Priority Score</th><th>Δ vs yesterday</th><th>Weekly Revenue (4w)</th><th>Live Products</th>
    </tr></thead><tbody>${rows}</tbody>`;
}

function renderHealth() {
  const c = D.systemConfig;
  $('#config-gates').innerHTML = `
    <div class="row"><span>MasterEnabled</span><span class="v">${c.MasterEnabled}</span></div>
    <div class="row"><span>DryRun</span><span class="v">${c.DryRun}</span></div>
    <div class="row"><span>LegalEntityConfirmed</span><span class="v">${c.LegalEntityConfirmed}</span></div>
    <div class="row"><span>InsuranceBoundUntil</span><span class="v">${c.InsuranceBoundUntil}</span></div>
    <div class="row"><span>EtsyShopOwnerType</span><span class="v">${c.EtsyShopOwnerType}</span></div>
    <div class="row"><span>DailyDiscoveryCap (shop age ${c.shopAge}d)</span><span class="v">${c.DailyDiscoveryCap}</span></div>

function openFile(productId, kind) {
  const p = D.reviewQueue.find(x => x.id === productId);
  if (!p) return;
  const fp = document.getElementById('file-preview-bg');
  let content = '', filename = '';
  if (kind === 'guide') {
    filename = `${p.id}_user_guide.pdf`;
    content = renderPDF(p, 'guide');
  } else if (kind === 'interactive') {
    if (p.format === 'Sheets') { filename = `${p.id}_interactive.gsheet`; content = renderSheet(p); }
    else if (p.format === 'Notion') { filename = `${p.id}_interactive.notion`; content = renderNotion(p); }
    else { filename = `${p.id}_fillable.pdf`; content = renderInteractivePDF(p); }
  } else {
    if (p.format === 'Sheets') { filename = `${p.id}_main.gsheet`; content = renderSheet(p); }
    else if (p.format === 'Notion') { filename = `${p.id}_main.notion`; content = renderNotion(p); }
    else { filename = `${p.id}_main.pdf`; content = renderPDF(p, 'main'); }
  }
  fp.innerHTML = `<div class="file-preview" onclick="event.stopPropagation()">
    <header>
      <span class="name">${filename}</span>
      <span class="tag accent">${p.format}</span>
      ${kind==='interactive'?'<span class="tag info">⚡ interactive</span>':''}
      <button class="x" onclick="closeFile()">×</button>
    </header>
    <div class="body">${content}</div>
    <footer>
      <span>This is exactly what the buyer receives in their download.</span>
      <span style="margin-left:auto">Sample preview — not a real download</span>
    </footer>
  </div>`;
  fp.classList.add('open');
}

function act(kind, id) {
  cardState[id] = kind === 'approve' ? 'approved' : 'rejected';
  const card = document.querySelector(`.product-card[data-id="${id}"]`);
  if (card) {
    card.classList.add(kind === 'approve' ? 'approved' : 'rejected');
    const banner = document.createElement('div');
    banner.className = 'state-banner ' + (kind === 'approve' ? 'approved' : 'rejected');
    banner.textContent = kind === 'approve' ? '✓ Approved — webhook fired, publishing to Etsy' : '✗ Rejected — sent back for review';
    card.prepend(banner);
  }
  // Update KPI: approved today
  if (kind === 'approve') {
    D.kpis.approvedToday++;
    D.kpis.readyForReview = Math.max(0, D.kpis.readyForReview - 1);
  } else {
    D.kpis.readyForReview = Math.max(0, D.kpis.readyForReview - 1);
  }
  renderKPIs();
}

document.addEventListener('click', e => {
  const btn = e.target.closest('button[data-act]');
  if (!btn) return;
  const { act: kind, id } = btn.dataset;
  if (kind === 'view') openDetail(id);
  else act(kind, id);
});
document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target.id === 'modal-bg') closeDetail();
});
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  const fp = document.getElementById('file-preview-bg');
  if (fp.classList.contains('open')) closeFile();
  else closeDetail();
});

renderGates(); renderKPIs(); renderQueue(); renderNiches(); renderHealth();
</script>
</body>
</html>
